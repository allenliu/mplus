name: Refresh data

on:
  schedule:
    # Off-peak minute (:17) — GitHub throttles scheduled runs at :00/:15/:30/:45
    - cron: '17 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: refresh-data
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/fetch-data.ts
      - name: Validate data.json is parseable
        run: node -e "JSON.parse(require('fs').readFileSync('public/data.json','utf8'))"
      - name: Commit data.json if changed
        run: |
          git config user.name "Allen Liu"
          git config user.email "liu.allen@gmail.com"
          git add public/data.json
          if ! git diff --staged --quiet; then
            git commit -m "Refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes"
          fi
